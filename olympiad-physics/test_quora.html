f2.quoracdn.net/main-thumb-ti-129194-50-qtpdinftzpwahhgfyffcrimqzyhvykkc.jpeg\",\"viewerCanContribute\":false,\"viewerCanAdmin\":false,\"viewerPermission\":null,\"isMuted\":false,\"viewerIsBlockedByTribe\":false,\"viewerIsOnlyAdmin\":false,\"owner\":null,\"numFollowers\":15},\"isDeleted\":false,\"isTribeItemContentDeleted\":false,\"viewerCanBlockTribeItemAuthor\":false,\"viewerIsAllowedToSendMessage\":false,\"__isTribeItem\":\"PostTribeItem\",\"contentObject\":{\"__typename\":\"Post\",\"contentType\":\"post\",\"id\":\"UG9zdEAwOjE3MzAxMDU3MA==\"},\"tribeItemId\":162731234,\"authorIsBlockedByTribe\":false,\"author\":{\"id\":\"VXNlckAwOjk0NDEzMjE=\",\"uid\":9441321,\"__typename\":\"User\",\"useTranslatedName\":false,\"isMachineAnswerBot\":false,\"names\":[{\"__typename\":\"UserName\",\"id\":\"VXNlck5hbWU6OTQ0MTMyMTpMQVRO\",\"reverseOrder\":false,\"givenName\":\"Angli\",\"familyName\":\"Liu\",\"scriptCode\":\"LATN\"}],\"adminNames\":[]},\"canInviteAuthorToTribe\":false,\"isTribeItemMonetizable\":true,\"isTribeItemPinned\":false,\"containsDifferentExistingPin\":false,\"viewerInvitedAuthorToTribe\":false,\"submission\":null,\"authorPermission\":3},\"url\":\"https://anglil.quora.com/Alla-conquista-dei-Cactus-to-Clouds\",\"title\":\"{\\\"sections\\\": [{\\\"spans\\\": [{\\\"text\\\": \\\"Alla conquista dei Cactus to Clouds\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"heading\\\", \\\"is_rtl\\\": false}]}\",\"isDeleted\":false,\"contentQtextDocument\":{\"legacyJson\":\"{\\\"sections\\\": [{\\\"spans\\\": [{\\\"text\\\": \\\"Con Jean e Sofiya sono andato a Palm Springs durante Memorial Weekend per una montagna che sognavo di conquistare. Sono arrivato a Palm Springs con la mia macchina. E Jean e Sofiya volarono a San Bernardino e presero un'auto a noleggio. Ci siamo incontrati a Palm Springs per un pasto e un caff\\u00e8 prima di separarci per andare a dormire e iniziare presto la mattina successiva.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"All'una di notte, Jean e io ci siamo incontrati all'inizio del sentiero e abbiamo iniziato subito l'escursione. Per fortuna non abbiamo perso nessuna marcia perch\\u00e9 il dislivello \\u00e8 elevato e il caldo di giorno sarebbe pericolosissimo.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Mentre camminavamo sul terreno ripido, dal terreno \\u00e8 emerso un panorama di Palm Springs e dell'intera valle di Coachella. Sotto il cielo notturno, l'intera valle risplendeva luminosa.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Ancora con abbastanza energia, raggiungiamo prontamente la prima cassetta di salvataggio (apparentemente ce ne sono 3 in totale lungo l'intero percorso). Per fortuna era ancora notte e la temperatura era fresca e addirittura confortevole, quindi nessuno ha bisogno di provviste e ne abbiamo portato abbastanza con noi.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"In breve tempo, il primo raggio di sole fece esplodere il cielo orientale. All'improvviso le luci sulla citt\\u00e0 in basso furono oscurate dalle luci che brillavano da dietro la montagna attraverso il cielo limpido e senza nuvole. La temperatura cominci\\u00f2 a salire. Ci siamo ritrovati in un terreno diverso con cespugli di manzanita e agavi (in fondo praticamente non c'era vegetazione).\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Siamo stati costantemente sorpassati dagli escursionisti americani. Probabilmente c'erano 10 gruppi che ci hanno superato. Lentamente ma inesorabilmente, dopo 10 ore di insidiosa escursione, ci stavamo avvicinando alla stazione del tram che segnala un drastico cambiamento nella pendenza del sentiero: dopo la stazione del tram, il sentiero sarebbe diventato molto pi\\u00f9 pianeggiante. Inoltre, la stazione del tram sar\\u00e0 il punto in cui in seguito riprenderemo il tram fino al fondovalle.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Al bar della stazione del tram ci siamo riforniti di cibo salato ed elettroliti, nessuno dei quali abbiamo portato con noi. \\u00c8 stato molto soddisfacente. Molti turisti prendevano anche il tram fino alla stazione, quindi il bar era molto affollato. Dopo la pausa erano quasi le 15.00. Abbiamo deciso di proseguire ma non eravamo cos\\u00ec sicuri se l'obiettivo sarebbe stato la vetta, perch\\u00e9 l'escursione di 10 ore precedente aveva richiesto molta energia e Jean aveva avuto un jet lag dal suo viaggio a Torino pochi giorni prima. Quindi abbiamo iniziato le restanti 6 miglia non con molta valenza.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Dopo circa 2 miglia, Jean avvert\\u00ec fortemente il jet lag, quindi fece un pisolino vicino a un ruscello. Ha cominciato a fare freddo a causa dell'alta quota. L\\u00ec ho notato la prima chiazza di neve. Sulla montagna non c'era segnale cellulare, quindi stavo solo osservando il torrente e il fogliame. Dopo circa un'ora Jean si \\u00e8 svegliato e abbiamo deciso di continuare a spingere.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Finalmente siamo arrivati \\u200b\\u200ball'ultimo tornante. Mancavano circa 20 minuti alla vetta. A quell'altitudine \\u00e8 iniziato il mal di montagna. Jean, con il mal di testa, ha deciso di restare l\\u00ec ad aspettarmi. Ho deciso di correre in vetta e tornare indietro in tempo per l'ultimo tram. Ho lasciato l\\u00ec il mio zaino, ho finito l'ultima goccia del mio gatorade e ho iniziato a correre. Ho finito velocemente il tornante e mi sono ritrovato in vista della vetta attraversando la neve. Dopo un po' di arrampicata su roccia, ero in vetta, con un gruppo di adolescenti provenienti dall'altro lato della montagna durante un viaggio in campeggio di 2 giorni. Ho scattato velocemente delle foto e sono tornato gi\\u00f9 per cercare Jean, solo per trovare Jean che cercava di risalire ancora per cercarmi, perch\\u00e9 pensava che avessi avuto un incidente. Ad essere sincero, avevo sentimenti contrastanti. Da un lato ho apprezzato molto che Jean sia venuto a trovarmi con il mal di testa. D'altra parte era divertente il fatto che pensasse che fossi caduto da un dirupo. In ogni caso ci siamo incontrati alla fine dell'ultimo tornante e siamo corsi velocemente gi\\u00f9 per la montagna fino alla stazione del tram. Quando abbiamo raggiunto la stazione del tram, erano le 21:00 ed era completamente buio. Eravamo entrambi esausti. Nessuno voleva parlare. Abbiamo incontrato Sofiya, che \\u00e8 venuta secondo il programma, alla stazione del tram e siamo scesi insieme. Penso che Jean ed io fossimo gli unici su quel tram a fare l'escursione di 20 ore, quindi quando tutti trasformarono quel tram in un rumoroso autobus da festa, pi\\u00f9 o meno crollammo sul pavimento del tram e ci addormentammo. Finalmente, dopo circa 20-30 minuti di trasporto e prima ancora pi\\u00f9 di un'ora di coda, siamo arrivati \\u200b\\u200bal fondovalle.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"La mattina dopo abbiamo festeggiato l'escursione (e il mio compleanno) con una able\":\"Post\",\"content\":\"{\\\"sections\\\": [{\\\"spans\\\": [{\\\"text\\\": \\\"Con Jean e Sofiya sono andato a Palm Springs durante Memorial Weekend per una montagna che sognavo di conquistare. Sono arrivato a Palm Springs con la mia macchina. E Jean e Sofiya volarono a San Bernardino e presero un'auto a noleggio. Ci siamo incontrati a Palm Springs per un pasto e un caff\\\\u00e8 prima di separarci per andare a dormire e iniziare presto la mattina successiva.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"All'una di notte, Jean e io ci siamo incontrati all'inizio del sentiero e abbiamo iniziato subito l'escursione. Per fortuna non abbiamo perso nessuna marcia perch\\\\u00e9 il dislivello \\\\u00e8 elevato e il caldo di giorno sarebbe pericolosissimo.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Mentre camminavamo sul terreno ripido, dal terreno \\\\u00e8 emerso un panorama di Palm Springs e dell'intera valle di Coachella. Sotto il cielo notturno, l'intera valle risplendeva luminosa.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"Ancora con abbastanza energia, raggiungiamo prontamente la prima cassetta di salvataggio (apparentemente ce ne sono 3 in totale lungo l'intero percorso). Per fortuna era ancora notte e la temperatura era fresca e addirittura confortevole, quindi nessuno ha bisogno di provviste e ne abbiamo portato abbastanza con noi.\\\", \\\"modifiers\\\": {}}], \\\"indent\\\": 0, \\\"quoted\\\": false, \\\"type\\\": \\\"plain\\\", \\\"is_rtl\\\": false}, {\\\"spans\\\": [{\\\"text\\\": \\\"In breve tempo, il primo raggio di sole fece esplodere il cielo orientale. All'improvviso le luci sulla citt\\\\u00e0 in bas
